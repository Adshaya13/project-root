server.port=${SERVER_PORT:8081}
spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:backend}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USERNAME:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=false

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT_MS:5000}

app.jwt.secret=${JWT_SECRET:change-this-secret-to-a-long-random-value-at-least-32-chars}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.application-name=${APP_NAME:CampusFlow}
app.bootstrap.admin-name=${BOOTSTRAP_ADMIN_NAME:System Admin}
app.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@campusflow.local}
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@1234}
app.bootstrap.student-name=${BOOTSTRAP_STUDENT_NAME:Test Student}
app.bootstrap.student-email=${BOOTSTRAP_STUDENT_EMAIL:student@campusflow.local}
app.bootstrap.student-phone=${BOOTSTRAP_STUDENT_PHONE:+94701234567}
app.bootstrap.student-password=${BOOTSTRAP_STUDENT_PASSWORD:Student@1234}
app.bootstrap.staff-name=${BOOTSTRAP_STAFF_NAME:Test Staff}
app.bootstrap.staff-email=${BOOTSTRAP_STAFF_EMAIL:staff@campusflow.local}
app.bootstrap.staff-phone=${BOOTSTRAP_STAFF_PHONE:+94771234567}
app.bootstrap.staff-password=${BOOTSTRAP_STAFF_PASSWORD:Staff@1234}
app.cors-origins=${APP_CORS_ORIGINS:http://localhost:8080,http://localhost:5173,http://localhost:3000}
app.booking.reviewer-authorities=${BOOKING_REVIEWER_AUTHORITIES:ROLE_ADMIN}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:}
