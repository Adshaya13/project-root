# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/smart_campus_hub
spring.data.mongodb.database=smart_campus_hub

# JWT
app.jwt.secret=SmartCampusHubSecretKey2026ITT3030PAFAssignmentSLIITFacultyOfComputing
app.jwt.expiration=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# Frontend URL (for OAuth redirect)
app.frontend.url=http://localhost:3000

# OAuth2 redirect after success
app.oauth2.redirect-uri=http://localhost:3000/oauth2/callback

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Logging
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
